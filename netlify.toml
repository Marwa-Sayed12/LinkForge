# netlify.toml

[build]
  command = "npm run build"
  publish = "dist"

# Redirect all short links to Supabase Edge Function
[[redirects]]
  from = "/*"
  to = "https://uogilqdfcskkakmxpdcu.supabase.co/functions/v1/redirect/:splat"
  status = 200
  force = true

# Your SPA routes - must be AFTER the catch-all redirect
[[redirects]]
  from = "/dashboard/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/auth"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/settings"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/features"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/index.html"
  status = 200

# Fallback for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false